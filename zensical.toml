[project]

site_name = "eggzec"
site_description = "Science & Computing"
site_author = "eggzec"
site_url = "https://eggzec.github.io/"

copyright = """
Copyright &copy; 2026 eggzec
"""

nav = [
  { "Home"      = "index.md"              },
  { "Projects"  = "projects/index.md"     },
  { "Community" = [
      { "Overview" = "community/index.md" },
      { "M. Saud Zahir" = "community/saud.md" },
      { "M. Laraib Ali" = "community/laraib.md" },
      { "Noor Mustafa" = "community/noor.md" },
    ]
  },
  { "How We Build" = "how-we-build.md"    },
  { "Contributing" = "contributing.md"    },
  { "Contact"   = "contact.md"            },
  { "Blogs"     = "blogs/index.md"        },
]

extra_javascript = [
  "assets/javascripts/mathjax.js",
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

extra_css = [
  "assets/stylesheets/extra.css",
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]

language = "en"
logo = "assets/images/logo.png"
favicon = "assets/images/logo.png"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]

# ----------------------------------------------------------------------------
# Color palette
# ----------------------------------------------------------------------------
[[project.theme.palette]]
scheme = "default"

# ----------------------------------------------------------------------------
# Social links
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/eggzec"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/org/eggzec/"
