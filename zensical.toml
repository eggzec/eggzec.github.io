[project]

site_name = "eggzec"
site_description = "Science & Computing — Open-source scientific Python packages"
site_author = "eggzec"
site_url = "https://eggzec.github.io/"

copyright = """
Copyright &copy; 2026 eggzec
"""

nav = [
  { "Home"      = "index.md"              },
  { "Projects"  = "projects/index.md"     },
  { "Community" = "community/index.md"    },
]

extra_javascript = [
  "assets/javascripts/mathjax.js",
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]

language = "en"
logo = "assets/images/logo.png"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]

# ----------------------------------------------------------------------------
# Color palette
# ----------------------------------------------------------------------------
[[project.theme.palette]]
scheme     = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme     = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Social links
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/eggzec"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/user/eggzec/"
